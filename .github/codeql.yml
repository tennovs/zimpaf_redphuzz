name: "CodeQL"
on:
  push:
    paths-ignore:
      - 'www/html/**'        # ignore benchmark apps
  pull_request:
    paths-ignore:
      - 'www/html/**'
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ['c','php', 'python'] # Check instrumentation code, authentication bypass code, and fuzzer code
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
